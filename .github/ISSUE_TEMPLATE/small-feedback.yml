name: Small feedback note
description: Leave one public-safe note without writing a full review.
title: "Feedback: "
body:
  - type: markdown
    attributes:
      value: |
        Keep this fake, small, and specific. Do not paste private logs, repo names, account details, screenshots, keys, or raw assistant transcripts.
  - type: textarea
    id: tried
    attributes:
      label: What did you try?
      placeholder: "The wrong-folder scenario in evals/scenarios.jsonl."
    validations:
      required: true
  - type: textarea
    id: assistant-did
    attributes:
      label: What did the assistant do?
      placeholder: "It noticed the root mismatch but still rewrote the README."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect it to do?
      placeholder: "Stop before editing and ask for the right project root."
    validations:
      required: true
  - type: textarea
    id: stop-point
    attributes:
      label: Where should it have stopped?
      placeholder: "Before touching files in the old checkout."
    validations:
      required: false
  - type: textarea
    id: fake-setup
    attributes:
      label: One fake setup that shows the problem
      placeholder: "Current folder is example-project-old. Expected folder is example-project."
    validations:
      required: false
  - type: dropdown
    id: smallest-fix
    attributes:
      label: Smallest useful fix
      options:
        - scenario
        - checklist line
        - template wording
        - rubric note
        - docs pointer
        - not sure
    validations:
      required: true
  - type: checkboxes
    id: public-safe
    attributes:
      label: Public-safety check
      options:
        - label: I rewrote private or real details as fake/generic details.
          required: true
        - label: I did not include secrets, keys, logs, account data, user data, private repo names, screenshots with private context, or raw transcripts.
          required: true
